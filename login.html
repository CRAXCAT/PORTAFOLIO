<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Portfolio Académico</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

  <div class="bg-grid"></div>
  <div class="noise-overlay"></div>

  <div class="auth-back-link">
    <a href="index.html">← Volver al Portfolio</a>
  </div>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-badge">ING. SISTEMAS</div>
      <h1 class="brand-title">Portfolio<br/><span>Académico</span></h1>
      <p class="brand-sub">Inicia sesión para descargar archivos y acceder a todo el contenido.</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Iniciar Sesión</button>
        <button class="tab-btn" data-tab="register">Registrarse</button>
      </div>

      <!-- LOGIN -->
      <div class="tab-content active" id="tab-login">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="login-email" placeholder="usuario@ejemplo.com"/>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-pass" placeholder="••••••••"/>
        </div>
        <div id="login-error" class="error-msg" style="display:none;"></div>
        <button class="btn-primary" id="btn-login">
          <span>Entrar</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- REGISTER -->
      <div class="tab-content" id="tab-register">
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" id="reg-name" placeholder="Tu nombre"/>
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="usuario@ejemplo.com"/>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="reg-pass" placeholder="Mín. 6 caracteres"/>
        </div>
        <div id="reg-error" class="error-msg" style="display:none;"></div>
        <div id="reg-success" class="success-msg" style="display:none;"></div>
        <button class="btn-primary" id="btn-register">
          <span>Crear cuenta</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
        <p class="reg-note">⚡ Las cuentas nuevas tienen rol <strong>user</strong> por defecto.</p>
      </div>
    </div>
  </div>

  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
